version: '3'

# Self-contained stack for e2e testing: real Postgres (migrations applied on
# boot), real Redis, and all four Go services wired together over HTTP/queue
# exactly as they run in production. api/login/dpw/aiw run in sync mode so
# the full request chain (api -> dpw, api -> aiw) is exercised synchronously
# and observable from a single Postman/Newman run.
#
# .env files for each service (api/.env, login/.env, data-process-worker/.env,
# app-integration-worker/.env, shared/.env) must exist before `docker compose
# build` — see .github/workflows/e2e.yml, which generates them.

services:
  e2e-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ../migrations:/migrations:ro
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  e2e-redis:
    image: redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

  login:
    build:
      context: ..
      dockerfile: login/dockerfile
    depends_on:
      e2e-postgres:
        condition: service_healthy
    ports:
      - "8081:8080"

  api:
    build:
      context: ..
      dockerfile: api/dockerfile
    depends_on:
      e2e-postgres:
        condition: service_healthy
      e2e-redis:
        condition: service_healthy
      dpw:
        condition: service_started
      aiw:
        condition: service_started
    ports:
      - "8080:8080"

  dpw:
    build:
      context: ..
      dockerfile: data-process-worker/dockerfile
    depends_on:
      e2e-postgres:
        condition: service_healthy
    ports:
      - "8082:8080"

  aiw:
    build:
      context: ..
      dockerfile: app-integration-worker/dockerfile
    depends_on:
      e2e-postgres:
        condition: service_healthy
    ports:
      - "8083:8080"
