name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    name: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No 'lint' script defined in package.json, skipping."
          fi

      - name: Test
        env:
          CI: true
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test ? 0 : 1)"; then
            npm test
          else
            echo "No 'test' script defined in package.json, skipping."
          fi

      - name: Build
        run: npm run build
