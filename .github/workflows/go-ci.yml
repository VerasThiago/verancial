name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - api
          - app-integration-worker
          - data-process-worker
          - login
          - shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: |
            api/go.sum
            app-integration-worker/go.sum
            data-process-worker/go.sum
            login/go.sum
            shared/go.sum

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test (race + coverage)
        working-directory: ${{ matrix.module }}
        run: go test ./... -race -coverprofile=coverage.out

      - name: Coverage summary
        if: always()
        working-directory: ${{ matrix.module }}
        run: |
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out | tail -1
            go tool cover -func=coverage.out
          else
            echo "No coverage.out generated for ${{ matrix.module }}"
          fi

      - name: Enforce 90% coverage gate
        working-directory: ${{ matrix.module }}
        run: |
          set -eu
          if [ ! -f coverage.out ]; then
            echo "No coverage.out generated for ${{ matrix.module }}"
            exit 1
          fi

          # Generated mocks (go.uber.org/mock output, no logic of our own to
          # test), pure process-bootstrap glue (cmd/server/main.go, the
          # top-level main.go), and shared/scripts (//go:build mage CLI
          # migration tools that panic without a live DB) are excluded from
          # the gate -- none of it is application logic we can meaningfully
          # unit test. Everything else counts.
          awk 'NR==1 || ($0 !~ /\/mocks\// && $0 !~ /\/cmd\/server\// && $0 !~ /\/main\.go:/ && $0 !~ /\/scripts\//)' \
            coverage.out > coverage.filtered.out

          THRESHOLD=90
          COVERAGE=$(go tool cover -func=coverage.filtered.out | tail -1 | grep -oE '[0-9]+\.[0-9]+')

          echo "Filtered coverage for ${{ matrix.module }}: ${COVERAGE}% (threshold: ${THRESHOLD}%)"

          awk -v cov="$COVERAGE" -v threshold="$THRESHOLD" 'BEGIN { exit !(cov >= threshold) }' \
            || { echo "Coverage ${COVERAGE}% is below the ${THRESHOLD}% threshold"; exit 1; }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module }}
          path: ${{ matrix.module }}/coverage.out
          if-no-files-found: ignore
